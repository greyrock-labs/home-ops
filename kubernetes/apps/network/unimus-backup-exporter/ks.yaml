---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unimus-backup-exporter
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: unimus-backup-exporter
  dependsOn:
    - name: unimus
  interval: 1h
  path: ./kubernetes/apps/network/unimus-backup-exporter/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  timeout: 5m
  wait: false
