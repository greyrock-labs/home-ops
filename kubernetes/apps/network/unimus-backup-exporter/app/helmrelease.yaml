---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unimus-backup-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: unimus-backup-exporter
  interval: 30m
  values:
    controllers:
      unimus-backup-exporter:
        type: cronjob
        cronjob:
          schedule: "0 3 * * *"
          backoffLimit: 0
          concurrencyPolicy: Forbid
          failedJobsHistory: 3
          successfulJobsHistory: 1
        containers:
          app:
            image:
              repository: docker.io/alpine
              tag: "3"
            command:
              - /bin/sh
              - /scripts/entrypoint.sh
            envFrom:
              - secretRef:
                  name: unimus-backup-exporter-secret
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL

    persistence:
      scripts:
        type: configMap
        name: unimus-backup-exporter
        defaultMode: 0755
        advancedMounts:
          unimus-backup-exporter:
            app:
              - path: /scripts/entrypoint.sh
                subPath: entrypoint.sh
              - path: /scripts/unimus-backup-exporter.sh
                subPath: unimus-backup-exporter.sh
      work:
        existingClaim: unimus-backup-exporter-backups
        advancedMounts:
          unimus-backup-exporter:
            app:
              - path: /work
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
