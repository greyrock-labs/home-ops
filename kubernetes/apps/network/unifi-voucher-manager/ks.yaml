---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unifi-voucher-manager
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: unifi-voucher-manager
  interval: 1h
  dependsOn:
    - name: externaldns-unifi
  path: "./kubernetes/apps/network/unifi-voucher-manager/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  timeout: 5m
  wait: false
