---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oxidized-config
data:
  config: |
    ---
    username: oxidized
    interval: 3600
    use_syslog: false
    debug: false
    threads: 30
    timeout: 20
    retries: 3
    extensions:
      oxidized-web:
        load: true
        listen: 0.0.0.0
        port: 8888
    input:
      default: ssh
      debug: false
      ssh:
        secure: false
        keys: false
    output:
      default: file
      file:
        directory: /data/configs
    hooks:
      push_to_forgejo:
        type: exec
        events: [post_store]
        cmd: /oxidized/push.sh
    source:
      default: csv
      csv:
        file: /oxidized/router.db
        delimiter: !ruby/regexp /:/
        map:
          name: 0
          model: 1
  router.db: |-
    # Format: hostname_or_ip:model
    # Ruckus ICX models: brocadeicx
    # Mikrotik models:   routeros
    #
    # Ruckus ICX switches
    # icx-sw01.internal.greyrock.io:brocadeicx
    # icx-sw02.internal.greyrock.io:brocadeicx
    #
    # Mikrotik switches
    switch-office-core.internal.greyrock.io:routeros
    #
    # Mikrotik router
    # mt-router.internal.greyrock.io:routeros
  push.sh: |
    #!/bin/sh
    set -e
    WORKDIR=$(mktemp -d)
    KEYFILE=$(mktemp)
    trap "rm -rf $WORKDIR $KEYFILE" EXIT
    cp /home/oxidized/.ssh/id_rsa "$KEYFILE"
    chmod 600 "$KEYFILE"
    GIT_SSH_COMMAND="ssh -i $KEYFILE -o UserKnownHostsFile=/home/oxidized/.ssh/known_hosts -o StrictHostKeyChecking=no"
    export GIT_SSH_COMMAND
    git clone git@git.greyrock.io:greyrock-labs/network-backups.git "$WORKDIR"
    cp /data/configs/* "$WORKDIR/"
    git -C "$WORKDIR" add -A
    git -C "$WORKDIR" -c user.name="Oxidized" -c user.email="oxidized@greyrock.io" \
      commit -m "auto: update $OX_NODE_NAME" || true
    git -C "$WORKDIR" push
