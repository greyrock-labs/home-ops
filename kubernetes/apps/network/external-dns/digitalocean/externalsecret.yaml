---
# yaml-language-server: $schema=https://k8s-schemas.greyrock.io/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: externaldns-digitalocean
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: externaldns-digitalocean-secret
    creationPolicy: Owner
  data:
    - secretKey: api_token
      remoteRef:
        key: DigitalOcean
        property: external-dns-api-token
