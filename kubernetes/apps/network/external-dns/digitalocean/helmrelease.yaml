---
# yaml-language-server: $schema=https://k8s-schemas.greyrock.io/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: externaldns-digitalocean
spec:
  chartRef:
    kind: OCIRepository
    name: externaldns-digitalocean
  interval: 30m
  values:
    fullnameOverride: externaldns-digitalocean
    logLevel: info
    domainFilters:
      - greyrock.io
    env:
      - name: DO_TOKEN
        valueFrom:
          secretKeyRef:
            name: externaldns-digitalocean-secret
            key: api_token
    extraArgs:
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --gateway-name=envoy-external
    podAnnotations:
      secret.reloader.stakater.com/reload: externaldns-digitalocean-secret
    policy: sync
    provider:
      name: digitalocean
    resources:
      requests:
        cpu: 13m
        memory: 42M
      limits:
        memory: 42M
    serviceMonitor:
      enabled: true
    sources:
      - crd
      - gateway-httproute
    triggerLoopOnEvent: true
    txtOwnerId: main
    txtPrefix: "k8s."
