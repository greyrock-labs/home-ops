---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: externaldns-mikrotik
spec:
  chartRef:
    kind: OCIRepository
    name: externaldns-mikrotik
  interval: 30m
  values:
    fullnameOverride: externaldns-mikrotik
    logLevel: &logLevel info
    domainFilters:
      - greyrock.io
    podAnnotations:
      secret.reloader.stakater.com/reload: externaldns-mikrotik-secret
    policy: sync
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/mirceanton/external-dns-provider-mikrotik
          tag: v1.6.2
        env:
          - name: LOG_LEVEL
            value: *logLevel
          - name: MIKROTIK_BASEURL
            value: https://10.1.20.1
          - name: MIKROTIK_SKIP_TLS_VERIFY
            value: "true"
          - name: MIKROTIK_USERNAME
            valueFrom:
              secretKeyRef:
                name: externaldns-mikrotik-secret
                key: username
          - name: MIKROTIK_PASSWORD
            valueFrom:
              secretKeyRef:
                name: externaldns-mikrotik-secret
                key: password
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8888
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8888
          initialDelaySeconds: 10
          timeoutSeconds: 5
    resources:
      requests:
        cpu: 16m
        memory: 90M
      limits:
        memory: 90M
    serviceMonitor:
      enabled: true
    sources:
      - crd
      - gateway-httproute
      - service
    triggerLoopOnEvent: true
    txtOwnerId: main
    txtPrefix: "k8s."
