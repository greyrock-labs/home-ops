---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: externaldns-opnsense
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: externaldns-opnsense-secret
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: opnsense-router
        property: key
    - secretKey: api-secret
      remoteRef:
        key: opnsense-router
        property: secret
