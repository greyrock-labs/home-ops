---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unimus
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: unimus
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: volsync
      namespace: system
  interval: 1h
  path: ./kubernetes/apps/network/unimus/app
  postBuild:
    substitute:
      APP: unimus
      VOLSYNC_CLAIM: unimus-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  timeout: 5m
  wait: false
