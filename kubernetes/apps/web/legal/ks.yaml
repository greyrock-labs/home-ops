---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: legal
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: legal
  interval: 1h
  path: ./kubernetes/apps/web/legal/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: web
  timeout: 5m
  wait: false
