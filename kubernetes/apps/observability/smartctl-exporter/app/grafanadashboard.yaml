---
# yaml-language-server: $schema=https://k8s-schemas.greyrock.io/grafana.integreatly.org/grafanafolder_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: smartctl-exporter
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  title: SMARTCTL Exporter
---
# yaml-language-server: $schema=https://k8s-schemas.greyrock.io/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: smartctl-exporter
spec:
  allowCrossNamespaceImport: true
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  folderRef: smartctl-exporter
  instanceSelector:
    matchLabels:
      dashboards: grafana
  url: https://grafana.com/api/dashboards/22604/revisions/2/download
