---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: alertmanager-secret
    creationPolicy: Owner
    template:
      data:
        pushover_api_token: "{{ .pushover_alertmanager_token }}"
        pushover_api_userkey: "{{ .pushover_userkey_todd }}"
        skedaddle_home_heartbeat_token: "{{ .gatus_skedaddle_home_heartbeat_token }}"
        skedaddle_home_heartbeat_url: "https://{{ .gatus_skedaddle_gatus_hostname }}/api/v1/endpoints/home_heartbeat/external?success=true"
  dataFrom:
    - extract:
        key: Pushover
      rewrite:
        - regexp:
            source: "(.*)"
            target: "pushover_$1"
        - regexp:
            source: "pushover_valid from"
            target: ""
    - extract:
        key: gatus
      rewrite:
        - regexp:
            source: "(.*)"
            target: "gatus_$1"
