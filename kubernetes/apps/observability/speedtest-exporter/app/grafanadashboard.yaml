---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanafolder_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: speedtest-exporter
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  title: Speedtest Exporter
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: speedtest-exporter
spec:
  allowCrossNamespaceImport: true
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  folderRef: speedtest-exporter
  instanceSelector:
    matchLabels:
      dashboards: grafana
  url: https://grafana.com/api/dashboards/20115/revisions/4/download
