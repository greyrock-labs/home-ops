---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: speedtest-exporter
  labels:
    app.kubernetes.io/instance: speedtest-exporter
    app.kubernetes.io/name: speedtest-exporter
spec:
  endpoints:
    - port: metrics
      interval: 1h
      scrapeTimeout: 1m
      relabelings:
        - action: replace
          replacement: speedtest-exporter
          targetLabel: job
        - action: replace
          replacement: speedtest-exporter
          targetLabel: instance
        - action: labeldrop
          regex: pod
      metricRelabelings:
        - action: labeldrop
          regex: ip|isp
  namespaceSelector:
    matchNames:
      - observability
  selector:
    matchLabels:
      app.kubernetes.io/instance: speedtest-exporter
      app.kubernetes.io/name: speedtest-exporter
