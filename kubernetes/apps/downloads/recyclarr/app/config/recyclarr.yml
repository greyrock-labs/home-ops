---
# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json

radarr:
  movies:
    base_url: http://radarr.downloads.svc.cluster.local:7878
    api_key: !env_var RADARR_API_KEY

    custom_formats:
      # 1) Original Language Only (penalize non-original-audio releases)
      - trash_ids:
          - d6e9318c875905d6cfb5bee961afcea9  # Language: Not Original (Original Only)
        assign_scores_to:
          - name: Remux + WEB 2160p
            score: -10000

      # 2) Block German in any form (German-only, German+Original, messy DL/ML)
      - trash_ids:
          - f845be10da4f442654c13e1f2c3d6cd5  # German DL (German + Original)
          - 6aad77771dabe9d3e9d7be86f310b867  # German DL (undefined)
          - 86bc3115eb4e9873ac96904a4a68e19e  # German only
        assign_scores_to:
          - name: Remux + WEB 2160p
            score: -10000

      # 3) Block French dual/MULTi releases (Original + French)
      - trash_ids:
          - 0542a48746585dc4444bbbb8a6bdf6ea  # Original + French (MULTi)
        assign_scores_to:
          - name: Remux + WEB 2160p
            score: -10000

      # 4) Bad Dual Groups (generic multi-audio garbage)
      - trash_ids:
          - b6832f586342ef70d9c128d40c07b872  # Bad Dual Groups
        assign_scores_to:
          - name: Remux + WEB 2160p
            score: -10000

    quality_profiles:
      # MAIN strict profile
      - name: Remux + WEB 2160p
        reset_unmatched_scores:
          enabled: false
        upgrade:
          allowed: true
          until_quality: Remux-2160p
        qualities:
          - name: Remux-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: DVD

      # INTL PROFILE (no language blocks)
      - name: Remux + WEB 2160p (Intl)
        reset_unmatched_scores:
          enabled: false
        upgrade:
          allowed: true
          until_quality: Remux-2160p
        qualities:
          - name: Remux-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: DVD

sonarr:
  series_web:
    base_url: http://sonarr.downloads.svc.cluster.local:8989
    api_key: !env_var SONARR_API_KEY

    custom_formats:
      # Original Language Only
      - trash_ids:
          - ae575f95ab639ba5d15f663bf019e3e8  # Language: Not Original (Original Only)
        assign_scores_to:
          - name: WEB-1080p
            score: -10000

      # German audio / German dual-audio
      - trash_ids:
          - ed51973a811f51985f14e2f6f290e47a  # German DL (German + Original)
          - c5dd0fd675f85487ad5bdf97159180bd  # German DL (undefined)
          - 8a9fcdbb445f2add0505926df3bb7b8a  # German only
        assign_scores_to:
          - name: WEB-1080p
            score: -10000

      # French dual-audio / Original+French
      - trash_ids:
          - 10e77b96ae4770a7de645a91a53ce29a  # Language: Original + French (MULTi)
        assign_scores_to:
          - name: WEB-1080p
            score: -10000

      # "Bad Dual Groups" & other unwanted group-related CFs
      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64  # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03  # No-RlsGroup (no release group)
          - e1a997ddb54e3ecbfe06341ad323c458  # Obfuscated tags / mangled names
          - 06d66ab109d4d2eddb2794d21526d140  # Retags
        assign_scores_to:
          - name: WEB-1080p
            score: -10000

    quality_profiles:
      - name: WEB-1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: false
          until_quality: WEBDL-1080p
        qualities:
          - name: WEBDL-1080p
          - name: WEBRip-1080p
          - name: HDTV-1080p
          - name: WEBDL-720p
          - name: WEBRip-720p
          - name: HDTV-720p

      - name: WEB-1080p (Intl)
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: false
          until_quality: WEBDL-1080p
        qualities:
          - name: WEBDL-1080p
          - name: WEBRip-1080p
          - name: HDTV-1080p
          - name: WEBDL-720p
          - name: WEBRip-720p
          - name: HDTV-720p
