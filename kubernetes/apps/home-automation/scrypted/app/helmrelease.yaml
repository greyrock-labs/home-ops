---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scrypted
spec:
  chartRef:
    kind: OCIRepository
    name: scrypted
  interval: 30m
  values:
    controllers:
      scrypted:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name":"multus-internal",
                "namespace": "network",
                "ips": ["10.1.1.2/24"],
                "mac": "2e:7e:33:e1:dd:ab"
              }]
          securityContext:
            fsGroup: 0
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/koush/scrypted
              tag: v0.119.3
            env:
              SCRYPTED_INSECURE_PORT: &httpPort 11080
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *httpPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 20Gi
            securityContext:
              privileged: true
    persistence:
      config:
        existingClaim: scrypted
        advancedMounts:
          scrypted:
            app:
              - path: /server/volume
      nvr-0:
        type: hostPath
        hostPath: /var/mnt/nvr-0
        advancedMounts:
          scrypted:
            app:
              - path: /mnt/nvr-0
      nvr-1:
        type: hostPath
        hostPath: /var/mnt/nvr-1
        advancedMounts:
          scrypted:
            app:
              - path: /mnt/nvr-1
    service:
      app:
        controller: scrypted
        ports:
          http:
            port: *httpPort
    route:
      app:
        hostnames:
          - scrypted.greyrock.io
        parentRefs:
          - name: envoy-internal
            namespace: network
