---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: scrypted
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: scrypted
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: multus-networks
      namespace: network
    - name: volsync
      namespace: system
  interval: 1h
  path: "./kubernetes/apps/home-automation/scrypted/app"
  postBuild:
    substitute:
      APP: scrypted
      APP_UID: "0"
      APP_GID: "0"
      VOLSYNC_CAPACITY: 20Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: home-automation
  timeout: 5m
  wait: false
