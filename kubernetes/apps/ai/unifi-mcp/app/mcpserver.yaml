---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: unifi-mcp
spec:
  alias: unifi
  transport: stdio
  workload:
    # renovate: datasource=docker depName=ghcr.io/mcp-proxy/mcp-proxy
    # agentgateway (mcp-proxy/mcp-proxy on ghcr.io) is an MCP gateway that
    # serves stdio MCP backends over HTTP. We use it to expose claytono's pure-stdio
    # binary at /mcp on :8080 — the URL the litellm-operator expects.
    image: ghcr.io/mcp-proxy/mcp-proxy:0.3.0
    # agentgateway is configured via /config/config.yaml mounted as a volume.
    # That config names claytono's binary as the stdio target; UNIFI_HOST and
    # UNIFI_API_KEY env vars on the workload are inherited by the stdio child.
    command:
      - /app/mcp-proxy
      - -f
      - /config/config.yaml
    volumes:
      - name: config
        configMap:
          name: unifi-mcp-config
    volumeMounts:
      - name: config
        mountPath: /config
    env:
      - name: UNIFI_HOST
        value: https://grey-rock-router.internal.greyrock.io
      - name: UNIFI_API_KEY
        valueFrom:
          secretKeyRef:
            name: unifi-mcp-secret
            key: UNIFI_API_KEY
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
