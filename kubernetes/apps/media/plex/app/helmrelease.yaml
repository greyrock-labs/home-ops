---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  chartRef:
    kind: OCIRepository
    name: plex
  interval: 30m
  values:
    controllers:
      plex:
        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: plex-gpu
          securityContext:
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 2000
            runAsUser: 2000
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.2.10687
            env:
              PLEX_ADVERTISE_URL: https://10.1.20.54:32400,https://plex.greyrock.io:443
              PLEX_NO_AUTH_NETWORKS: 10.244.0.0/16
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: 32400
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 100m
              limits:
                memory: 9248M
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
    persistence:
      config:
        existingClaim: plex-config
        advancedMounts:
          plex:
            app:
              - path: /config
      plex-cache:
        existingClaim: plex-cache
        advancedMounts:
          plex:
            app:
              - path: /config/Library/Application Support/Plex Media Server/Cache
      tmpfs:
        type: emptyDir
        advancedMounts:
          plex:
            app:
              - path: /config/Library/Application Support/Plex Media Server/Logs
                subPath: log
              - path: /transcode
                subPath: transcode
      nfs-nas-media:
        type: nfs
        server: codswallop.internal.greyrock.io
        path: /mnt/user/data
        advancedMounts:
          plex:
            app:
              - path: /data/nas-media
                subPath: media
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: https://plex.greyrock.io/identity
            conditions:
              - "[STATUS] == 200"
        hostnames:
          - plex.greyrock.io
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.1.20.54
        externalTrafficPolicy: Local
        ports:
          http:
            port: 32400
