---
# yaml-language-server: $schema=https://k8s-schemas.greyrock.io/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: seerr
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: seerr
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: volsync
      namespace: system
  interval: 1h
  path: "./kubernetes/apps/media/seerr/app"
  postBuild:
    substitute:
      APP: seerr
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false
