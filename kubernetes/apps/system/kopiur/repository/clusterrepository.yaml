---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: nas
spec:
  allowedNamespaces:
    all: true
  backend:
    filesystem:
      path: /repo
      volume:
        nfs:
          path: /mnt/user/backup/kopiur
          server: codswallop.internal.greyrock.io
  credentialProjection:
    allowed: true
  encryption:
    passwordSecretRef:
      name: kopiur-nas-secret
      namespace: system
      key: KOPIA_PASSWORD
  identityDefaults:
    hostnameExpr: namespace
    usernameExpr: policyName
  moverDefaults:
    podSecurityContext:
      # Every backend-writer (bootstrap connect/create Job + all snapshot/
      # maintenance movers) joins the export's shared group so it can write the
      # NFS-backed kopia repo regardless of its per-policy runAsUser. fsGroup is
      # a no-op on NFS; supplemental GIDs are honored over AUTH_SYS. The export
      # on codswallop must be `chown 3001:3001` + `chmod 2775` (setgid) so kopia
      # creates the repo with group-accessible modes.
      supplementalGroups: [3001]
