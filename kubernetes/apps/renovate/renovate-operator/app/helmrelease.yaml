---
# yaml-language-server: $schema=https://k8s-schemas.greyrock.io/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  interval: 30m
  values:
    fullnameOverride: renovate-operator
    route:
      enabled: true
      hostnames:
        - renovate.greyrock.io
      parentRefs:
        - name: envoy-internal
          namespace: network
    webhook:
      enabled: true
      route:
        enabled: true
        hostnames:
          - renovate-webhook.greyrock.io
        parentRefs:
          - name: envoy-internal
            namespace: network
