---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager-digitalocean
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: cert-manager-digitalocean-secret
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: DigitalOcean
        property: cert-manager-api-token
