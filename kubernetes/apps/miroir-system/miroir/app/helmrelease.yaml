---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miroir
spec:
  chartRef:
    kind: OCIRepository
    name: miroir
  interval: 30m
  upgrade:
    crds: CreateReplace
  values:
    nodes:
      kerfuffle:
        pools:
          default:
            backend: zfs
            zfsDataset: data-pool/miroir
    storageClasses:
      - name: miroir-local
        isDefault: true
        replicas: 1
      - name: miroir-replicated
        isDefault: false
        replicas: 2
        quorum: last-man-standing
    volumeSnapshotClasses:
      - name: miroir-snap
