---
services:
  coolercontrold:
    container_name: coolercontrold
    image: docker.io/coolercontrol/coolercontrold:4.3.1
    ports:
      - 11987:11987
    privileged: true
    restart: unless-stopped
    volumes:
      - config:/etc/coolercontrol
volumes:
  config:
    driver: local
    driver_opts:
      device: /mnt/drone/apps/coolercontrol/config
      o: bind
      type: none
