---
networks:
  apps:
    name: apps
    external: false
services:
  traefik:
    command:
      - --certificatesresolvers.cf.acme.caserver=https://acme-v02.api.letsencrypt.org/directory
      - --certificatesresolvers.cf.acme.dnsChallenge.provider=digitalocean
      - --certificatesresolvers.cf.acme.storage=/certs/acme.json
      - --entryPoints.web.address=:80
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --entrypoints.websecure.http.tls.certResolver=cf
      - --entrypoints.websecure.http.tls.domains[0].main=*.greyrock.io
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
    container_name: traefik
    environment:
      - DO_AUTH_TOKEN=${DO_AUTH_TOKEN}
    image: traefik:v3.7.8
    networks:
      - apps
    ports:
      - 80:80
      - 443:443
    volumes:
      - acme:/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
volumes:
  acme:
